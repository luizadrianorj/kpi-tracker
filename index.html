<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KPI Diário">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="manifest.json">
<title>KPI Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede8;
    --muted: #6b6860;
    --accent: #c8f060;
    --accent-dim: rgba(200,240,96,0.12);
    --accent-text: #1a2800;
    --danger: #ff5a5a;
    --r: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overscroll-behavior: none; }

  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  .header { padding: env(safe-area-inset-top, 16px) 20px 16px; padding-top: max(env(safe-area-inset-top), 20px); background: var(--bg); border-bottom: 0.5px solid var(--border); }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .app-title { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 400; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; }
  .date-nav { display: flex; align-items: center; gap: 10px; }
  .nav-btn { background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text); font-size: 14px; transition: background .15s; }
  .nav-btn:hover { background: #2e2e2e; }
  .date-display { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text); min-width: 130px; text-align: center; }
  .date-display span { color: var(--accent); }

  /* Progress ring */
  .progress-bar-wrap { height: 3px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .4s ease; }

  /* Nav tabs */
  .tabs { display: flex; border-bottom: 0.5px solid var(--border); background: var(--bg); }
  .tab-btn { flex: 1; padding: 12px; font-size: 12px; font-family: 'DM Mono', monospace; letter-spacing: .06em; color: var(--muted); background: transparent; border: none; cursor: pointer; transition: color .15s; text-transform: uppercase; }
  .tab-btn.active { color: var(--accent); border-bottom: 1.5px solid var(--accent); margin-bottom: -0.5px; }

  /* Sections */
  .section { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: max(20px, env(safe-area-inset-bottom)); }

  /* Summary row */
  .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
  .scard { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--r); padding: 12px; }
  .scard .lbl { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px; }
  .scard .val { font-size: 22px; font-weight: 300; color: var(--text); }
  .scard.accent { background: var(--accent-dim); border-color: rgba(200,240,96,0.2); }
  .scard.accent .val { color: var(--accent); }

  /* KPI list */
  .kpi-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .kpi-item { display: flex; align-items: center; gap: 12px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--r); padding: 14px 16px; cursor: pointer; transition: border-color .15s, background .15s; user-select: none; }
  .kpi-item:active { transform: scale(0.98); }
  .kpi-item.done { border-color: rgba(200,240,96,0.3); background: var(--accent-dim); }
  .check-circle { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .2s; }
  .kpi-item.done .check-circle { background: var(--accent); border-color: var(--accent); }
  .check-icon { display: none; }
  .kpi-item.done .check-icon { display: block; }
  .check-circle svg { width: 12px; height: 12px; }
  .kpi-name { flex: 1; font-size: 14px; font-weight: 400; color: var(--text); }
  .kpi-item.done .kpi-name { color: var(--accent); }
  .del-btn { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 18px; line-height: 1; padding: 2px 4px; transition: color .15s; border-radius: 4px; }
  .del-btn:hover { color: var(--danger); }

  /* Add form */
  .add-row { display: flex; gap: 8px; }
  .add-input { flex: 1; background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--r); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 0 14px; height: 44px; outline: none; transition: border-color .15s; }
  .add-input::placeholder { color: var(--muted); }
  .add-input:focus { border-color: rgba(200,240,96,0.4); }
  .add-btn { background: var(--accent); border: none; border-radius: var(--r); color: var(--accent-text); font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; letter-spacing: .06em; padding: 0 16px; height: 44px; cursor: pointer; white-space: nowrap; transition: opacity .15s; }
  .add-btn:hover { opacity: 0.88; }
  .add-btn:active { opacity: 0.75; }

  /* Chart section */
  .chart-mode-row { display: flex; gap: 6px; margin-bottom: 16px; }
  .mode-btn { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 8px; padding: 6px 14px; font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: .06em; color: var(--muted); cursor: pointer; text-transform: uppercase; transition: all .15s; }
  .mode-btn.active { background: var(--accent-dim); border-color: rgba(200,240,96,0.3); color: var(--accent); }
  .chart-wrap { position: relative; width: 100%; height: 220px; margin-bottom: 16px; }
  .chart-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }

  /* Empty state */
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; line-height: 1.7; }

  /* Fade-in */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .kpi-item { animation: fadeIn .2s ease both; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <span class="app-title">KPI Diário</span>
      <div class="date-nav">
        <button class="nav-btn" id="prev-day">&#8592;</button>
        <div class="date-display" id="date-display"></div>
        <button class="nav-btn" id="next-day">&#8594;</button>
      </div>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar" style="width:0%"></div></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-hoje" onclick="showTab('hoje')">Hoje</button>
    <button class="tab-btn" id="tab-grafico" onclick="showTab('grafico')">Gráfico</button>
  </div>

  <div class="section" id="sec-hoje">
    <div class="summary">
      <div class="scard"><div class="lbl">Feitos</div><div class="val" id="s-done">0</div></div>
      <div class="scard"><div class="lbl">Total</div><div class="val" id="s-total">0</div></div>
      <div class="scard accent"><div class="lbl">Taxa</div><div class="val" id="s-rate">0%</div></div>
    </div>
    <div class="kpi-list" id="kpi-list"></div>
    <div class="add-row">
      <input class="add-input" type="text" id="new-kpi" placeholder="Novo KPI..." />
      <button class="add-btn" onclick="addKPI()">+ Adicionar</button>
    </div>
  </div>

  <div class="section" id="sec-grafico" style="display:none">
    <div class="chart-mode-row">
      <button class="mode-btn active" id="cm-month" onclick="setChartMode('month')">Este mês</button>
      <button class="mode-btn" id="cm-compare" onclick="setChartMode('compare')">Comparar</button>
    </div>
    <div class="chart-legend" id="chart-legend"></div>
    <div class="chart-wrap"><canvas id="kpiChart"></canvas></div>
    <div class="stat-grid" id="stat-grid"></div>
  </div>
</div>

<script>
const KEY = 'kpi_pwa_v1';
let state = {
  kpis: ['Ciclos de movimento','Flexões de braço','Abdominais (100)','5 km corrida','30 min leitura'],
  logs: {}
};
try { const s = localStorage.getItem(KEY); if(s) state = JSON.parse(s); } catch(e){}

const MONTHS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const DAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
let curDate = new Date();
let chartMode = 'month';
let kpiChart = null;

function dk(d){ return d.toISOString().slice(0,10); }
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }

function fmtDate(d){
  const today = dk(new Date()) === dk(d);
  const day = DAYS[d.getDay()];
  const str = day + ', ' + d.getDate() + ' ' + MONTHS[d.getMonth()];
  return today ? '<span>Hoje</span>, ' + d.getDate() + ' ' + MONTHS[d.getMonth()] : str;
}

function renderDay(){
  document.getElementById('date-display').innerHTML = fmtDate(curDate);
  const key = dk(curDate);
  const log = state.logs[key] || {};
  const list = document.getElementById('kpi-list');
  list.innerHTML = '';
  if(!state.kpis.length){
    list.innerHTML = '<div class="empty">Nenhum KPI ainda.<br>Adicione o primeiro abaixo.</div>';
  }
  state.kpis.forEach((kpi, i) => {
    const done = !!log[i];
    const el = document.createElement('div');
    el.className = 'kpi-item' + (done?' done':'');
    el.style.animationDelay = (i*0.04)+'s';
    el.innerHTML = `
      <div class="check-circle">
        <svg class="check-icon" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="#1a2800" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="kpi-name">${escHtml(kpi)}</span>
      <button class="del-btn" onclick="delKPI(${i},event)">&#215;</button>`;
    el.addEventListener('click', ()=>toggleKPI(i));
    list.appendChild(el);
  });
  const done = Object.values(log).filter(Boolean).length;
  const total = state.kpis.length;
  const rate = total ? Math.round(done/total*100) : 0;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-rate').textContent = rate + '%';
  document.getElementById('progress-bar').style.width = rate + '%';
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toggleKPI(i){
  const key = dk(curDate);
  if(!state.logs[key]) state.logs[key]={};
  state.logs[key][i] = !state.logs[key][i];
  save(); renderDay();
}

function delKPI(i, e){
  e.stopPropagation();
  if(!confirm('Remover "'+state.kpis[i]+'"?')) return;
  state.kpis.splice(i,1);
  Object.keys(state.logs).forEach(k=>{
    const nl={};
    Object.keys(state.logs[k]).forEach(j=>{
      const n=parseInt(j);
      if(n<i) nl[n]=state.logs[k][j];
      else if(n>i) nl[n-1]=state.logs[k][j];
    });
    state.logs[k]=nl;
  });
  save(); renderDay();
}

function addKPI(){
  const inp=document.getElementById('new-kpi');
  const v=inp.value.trim();
  if(!v) return;
  state.kpis.push(v);
  save(); renderDay();
  inp.value='';
  inp.focus();
}

document.getElementById('new-kpi').addEventListener('keydown',e=>{ if(e.key==='Enter') addKPI(); });
document.getElementById('prev-day').onclick=()=>{ curDate=new Date(curDate-864e5); renderDay(); };
document.getElementById('next-day').onclick=()=>{ curDate=new Date(curDate.getTime()+864e5); renderDay(); };

function showTab(t){
  document.getElementById('sec-hoje').style.display = t==='hoje'?'':'none';
  document.getElementById('sec-grafico').style.display = t==='grafico'?'':'none';
  document.getElementById('tab-hoje').className='tab-btn'+(t==='hoje'?' active':'');
  document.getElementById('tab-grafico').className='tab-btn'+(t==='grafico'?' active':'');
  if(t==='grafico') renderChart();
}

function setChartMode(m){
  chartMode=m;
  document.getElementById('cm-month').className='mode-btn'+(m==='month'?' active':'');
  document.getElementById('cm-compare').className='mode-btn'+(m==='compare'?' active':'');
  renderChart();
}

function getMonthRates(yr, mo){
  const days = new Date(yr,mo+1,0).getDate();
  return Array.from({length:days},(_,i)=>{
    const k=`${yr}-${String(mo+1).padStart(2,'0')}-${String(i+1).padStart(2,'0')}`;
    const log=state.logs[k]||{};
    const done=Object.values(log).filter(Boolean).length;
    return state.kpis.length ? Math.round(done/state.kpis.length*100) : 0;
  });
}

function calcStreak(){
  let streak=0, d=new Date();
  while(streak<365){
    const log=state.logs[dk(d)]||{};
    if(Object.values(log).filter(Boolean).length>0) streak++;
    else break;
    d=new Date(d.getTime()-864e5);
  }
  return streak;
}

const PALETTE=['#c8f060','#60c8f0','#f060a8'];

function renderChart(){
  if(kpiChart){ kpiChart.destroy(); kpiChart=null; }
  const ctx=document.getElementById('kpiChart').getContext('2d');
  const now=new Date(), yr=now.getFullYear(), mo=now.getMonth();

  if(chartMode==='month'){
    const rates=getMonthRates(yr,mo);
    const labels=rates.map((_,i)=>String(i+1));
    document.getElementById('chart-legend').innerHTML=`<div class="legend-item"><span class="legend-dot" style="background:#c8f060"></span>${MONTHS[mo]} ${yr}</div>`;
    kpiChart=new Chart(ctx,{
      type:'bar',
      data:{labels,datasets:[{data:rates,backgroundColor:rates.map(v=>v===100?'#c8f060':v>0?'rgba(200,240,96,0.5)':'rgba(200,240,96,0.1)'),borderRadius:3,borderSkipped:false}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.y+'%'}}},scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%',color:'#6b6860',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'}},x:{ticks:{color:'#6b6860',font:{size:10},autoSkip:true,maxTicksLimit:15},grid:{display:false}}}}
    });
    const avg=Math.round(rates.reduce((a,b)=>a+b,0)/rates.length);
    const best=Math.max(...rates);
    document.getElementById('stat-grid').innerHTML=`
      <div class="scard"><div class="lbl">Média do mês</div><div class="val">${avg}%</div></div>
      <div class="scard"><div class="lbl">Melhor dia</div><div class="val">${best}%</div></div>
      <div class="scard accent"><div class="lbl">Sequência</div><div class="val">${calcStreak()} dias</div></div>`;
  } else {
    const datasets=[];
    const legendHtml=[];
    for(let i=2;i>=0;i--){
      let m=mo-i, y=yr; if(m<0){m+=12;y--;}
      const rates=getMonthRates(y,m);
      const color=PALETTE[2-i];
      datasets.push({label:MONTHS[m]+' '+y,data:rates,borderColor:color,backgroundColor:'transparent',tension:0.35,pointRadius:1.5,fill:false});
      legendHtml.push(`<div class="legend-item"><span class="legend-dot" style="background:${color}"></span>${MONTHS[m]} ${y}</div>`);
    }
    document.getElementById('chart-legend').innerHTML=legendHtml.join('');
    const maxDays=Math.max(...datasets.map(d=>d.data.length));
    kpiChart=new Chart(ctx,{
      type:'line',
      data:{labels:Array.from({length:maxDays},(_,i)=>String(i+1)),datasets},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%',color:'#6b6860',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'}},x:{ticks:{color:'#6b6860',font:{size:10},autoSkip:true,maxTicksLimit:15},grid:{display:false}}}}
    });
    const statHtml=datasets.map(ds=>{
      const avg=Math.round(ds.data.reduce((a,b)=>a+b,0)/ds.data.length);
      const color=ds.borderColor;
      return `<div class="scard"><div class="lbl" style="color:${color}">${ds.label}</div><div class="val">${avg}% médio</div></div>`;
    }).join('');
    document.getElementById('stat-grid').innerHTML=statHtml;
  }
}

if('serviceWorker' in navigator){ window.addEventListener('load',()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); }); }

renderDay();
</script>
</body>
</html>
